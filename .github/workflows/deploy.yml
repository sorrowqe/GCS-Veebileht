name: Deploy to GCS
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/upload-cloud-storage@v2
        with:
          path: .
          destination: ${{ secrets.GCS_BUCKET_NAME }}
          glob: "**/*.html"
          parent: false